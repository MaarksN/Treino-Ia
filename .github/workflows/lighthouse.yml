name: Lighthouse

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"

permissions:
  contents: read

jobs:
  lhci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          VITE_ENV: production
        run: npm run build

      - name: Lighthouse CI
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          VITE_ENV: production
        run: npm exec --yes @lhci/cli@0.15.x -- autorun --config=./lighthouserc.json
