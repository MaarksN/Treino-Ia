<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#a3e635" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treino App - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0d0d0d;
        color: #e8e8e8;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .card {
        width: min(92vw, 520px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 28px;
        padding: 32px;
        background: #161616;
        box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      }

      .badge {
        display: inline-block;
        color: #0d0d0d;
        background: #a3e635;
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 800;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      h1 {
        font-size: 32px;
        margin: 18px 0 8px;
      }

      p {
        color: rgba(232,232,232,0.72);
        line-height: 1.6;
      }

      button {
        margin-top: 20px;
        width: 100%;
        border: 0;
        border-radius: 16px;
        padding: 14px 18px;
        background: #a3e635;
        color: #0d0d0d;
        font-weight: 900;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <main class="card">
      <span class="badge">Offline</span>
      <h1>Voce esta sem conexao</h1>
      <p>
        O app continua funcionando com os dados recentes salvos no dispositivo.
        Suas acoes serao sincronizadas quando a internet voltar.
      </p>
      <button onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
