<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treino IA QA Harness</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React, { useMemo, useState } from 'react';
      import { createRoot } from 'react-dom/client';
      import '/src/index.css';
      import { WorkoutDashboard } from '/src/components/WorkoutDashboard.tsx';
      import { DailyCheckinForm } from '/src/components/DailyCheckin.tsx';
      import { ActiveWorkoutView } from '/src/components/ActiveWorkoutView.tsx';
      import { PeriodizationLab } from '/src/components/PeriodizationLab.tsx';
      import { BiometricDashboard } from '/src/components/BiometricDashboard.tsx';
      import { PremiumPaywall } from '/src/components/PremiumPaywall.tsx';
      import { ExerciseLibraryModal } from '/src/components/ExerciseLibraryModal.tsx';
      import { SocialHub } from '/src/components/SocialHub.tsx';
      import { GroupHub } from '/src/components/GroupHub.tsx';
      import { ChallengeParty } from '/src/components/ChallengeParty.tsx';
      import { CoachConsole } from '/src/components/CoachConsole.tsx';

      const sampleProfile = {
        id: 'qa-profile',
        age: 34,
        gender: 'masculino',
        weight: 82,
        height: 178,
        experienceLevel: 'intermediario',
        goal: 'Hipertrofia',
        secondaryGoal: 'Forca',
        daysPerWeek: 4,
        sessionDuration: '50',
        preferredTime: '07:00',
        injuries: 'Nenhuma',
        equipment: 'Academia completa',
        gymType: 'Academia completa',
        sleepHours: '7',
        stressLevel: 'Medio',
        preferredMethods: ['progressao dupla'],
        weakPoints: 'ombros',
        timePerWorkout: 50,
        workoutLocation: 'Academia',
      };

      const sampleDay = {
        id: 'qa-day-1',
        dayName: 'Dia 1',
        focus: 'Push',
        warmup: 'Mobilidade de ombro',
        cooldown: 'Alongamento leve',
        estimatedDuration: '50 min',
        exercises: [
          {
            id: 'qa-ex-1',
            name: 'Supino reto',
            sets: 3,
            reps: '8-10',
            rest: '90s',
            muscleGroup: 'Peito',
            movementPattern: 'Empurrar Horizontal',
            tags: ['barra', 'composto'],
            notes: 'Controle a descida e mantenha escapulas fixas.',
          },
          {
            id: 'qa-ex-2',
            name: 'Desenvolvimento com halteres',
            sets: 3,
            reps: '10-12',
            rest: '75s',
            muscleGroup: 'Ombros',
            movementPattern: 'Empurrar Vertical',
            tags: ['halteres'],
          },
        ],
      };

      const initialPlan = {
        id: 'qa-plan',
        createdAt: Date.now(),
        planName: 'QA Hipertrofia Split',
        goalDescription: 'Plano de smoke test com volume moderado e foco em execucao.',
        days: [
          sampleDay,
          {
            id: 'qa-day-2',
            dayName: 'Dia 2',
            focus: 'Pull',
            estimatedDuration: '50 min',
            exercises: [
              {
                id: 'qa-ex-3',
                name: 'Remada baixa',
                sets: 4,
                reps: '8-12',
                rest: '90s',
                muscleGroup: 'Costas',
                movementPattern: 'Puxar Horizontal',
              },
            ],
          },
        ],
      };

      const initialCheckin = {
        id: 'qa-checkin',
        date: new Date().toISOString().slice(0, 10),
        sleepHours: 7,
        sleepQuality: 4,
        stressLevel: 4,
        sorenessMap: { Peito: 2, Ombros: 3 },
        energyLevel: 8,
        hydrationGlasses: 6,
        sleepGoalHours: 8,
        notes: 'QA baseline',
        timestamp: Date.now(),
      };

      const recoveryCheckin = {
        sleepHours: 7,
        stressLevel: 4,
        sorenessLevel: 3,
        energyLevel: 8,
        timestamp: Date.now(),
      };

      const workoutHistory = [
        {
          id: 'qa-history-1',
          date: Date.now() - 86400000,
          planId: 'qa-plan',
          dayId: 'qa-day-1',
          dayName: 'Dia 1',
          focus: 'Push',
          volumeLoad: 4200,
          durationMinutes: 50,
          exercises: [
            {
              ...sampleDay.exercises[0],
              completed: true,
              actualWeight: 70,
              actualReps: '9',
              rpe: 8,
            },
          ],
        },
      ];

      const performances = [
        {
          exerciseName: 'Supino reto',
          muscle: 'Peito',
          sets: 10,
          currentLoad: 70,
          targetReps: 10,
          actualReps: 10,
          rpe: 8,
          completed: true,
        },
        {
          exerciseName: 'Remada baixa',
          muscle: 'Costas',
          sets: 12,
          currentLoad: 65,
          targetReps: 12,
          actualReps: 11,
          rpe: 8,
          completed: true,
        },
      ];

      const tabs = [
        ['dashboard', 'Dashboard'],
        ['daily-checkin', 'Daily check-in'],
        ['active-workout', 'Treino ativo'],
        ['periodization', 'Periodization Lab'],
        ['biometrics', 'Biometric Dashboard'],
        ['premium', 'Premium Paywall'],
        ['exercise-library', 'Exercise Library Modal'],
        ['social', 'SocialHub'],
        ['group', 'GroupHub'],
        ['challenge', 'ChallengeParty'],
        ['coach', 'CoachConsole'],
      ];

      function Shell() {
        const [view, setView] = useState('dashboard');
        const [plan, setPlan] = useState(initialPlan);
        const [historyRecords, setHistoryRecords] = useState(workoutHistory);
        const [sessions, setSessions] = useState([]);
        const [checkin, setCheckin] = useState(initialCheckin);
        const [recovery, setRecovery] = useState(recoveryCheckin);
        const [status, setStatus] = useState('Harness pronta.');
        const [activeDay, setActiveDay] = useState(sampleDay);

        const commonProps = useMemo(() => ({
          plan,
          history: [plan],
          workoutHistory: historyRecords,
          sessions,
          profile: sampleProfile,
          recoveryCheckin: recovery,
          onUpdatePlan: setPlan,
          onSaveSession: session => {
            setSessions(current => [...current, session]);
            setStatus('Sessao salva na harness.');
          },
          onSaveRecoveryCheckin: next => {
            setRecovery(next);
            setStatus('Recovery check-in salvo.');
          },
          onSelectHistory: () => setStatus('Historico selecionado.'),
          onNew: () => setStatus('Novo plano solicitado.'),
          onCompleteDay: record => {
            setHistoryRecords(current => [record, ...current]);
            setStatus('Dia concluido na harness.');
          },
          onSaveNewPlan: next => {
            setPlan(next);
            setStatus('Novo plano salvo na harness.');
          },
          dailyCheckin: checkin,
          allDailyCheckins: [checkin],
          userProfile: sampleProfile,
        }), [checkin, historyRecords, plan, recovery, sessions]);

        const currentView = (() => {
          if (view === 'dashboard') return React.createElement(WorkoutDashboard, commonProps);
          if (view === 'daily-checkin') {
            return React.createElement(DailyCheckinForm, {
              existing: checkin,
              dataMode: 'local',
              warning: 'QA harness local: sem persistencia externa.',
              onSave: next => {
                setCheckin(next);
                setStatus('Daily check-in salvo na harness.');
              },
            });
          }
          if (view === 'active-workout') {
            return React.createElement(ActiveWorkoutView, {
              day: activeDay,
              workoutHistory: historyRecords,
              onComplete: completedDay => {
                setActiveDay(completedDay);
                setStatus('Treino ativo concluido na harness.');
                setView('dashboard');
              },
              onCancel: () => {
                setStatus('Treino ativo fechado.');
                setView('dashboard');
              },
              voiceEnabled: false,
            });
          }
          if (view === 'periodization') {
            return React.createElement(PeriodizationLab, {
              performances,
              fatigue: {
                readiness: 72,
                soreness: 3,
                sleep: 7,
                stress: 4,
                weeklyVolume: 22,
                completedSessions: 3,
                missedSessions: 0,
              },
            });
          }
          if (view === 'biometrics') return React.createElement(BiometricDashboard, { profile: sampleProfile });
          if (view === 'premium') {
            return React.createElement(PremiumPaywall, {
              trigger: {
                source: 'qa_harness',
                feature: 'periodization_lab',
                title: 'QA Premium Paywall',
                description: 'Smoke test do modal de upgrade.',
              },
              onClose: () => {
                setStatus('Paywall fechado.');
                setView('dashboard');
              },
            });
          }
          if (view === 'exercise-library') return React.createElement(ExerciseLibraryModal, {
            onClose: () => {
              setStatus('Biblioteca fechada.');
              setView('dashboard');
            },
          });
          if (view === 'social') return React.createElement(SocialHub, { currentPlan: plan });
          if (view === 'group') return React.createElement(GroupHub, { currentProfile: null });
          if (view === 'challenge') return React.createElement(ChallengeParty, { groupId: 'qa-group' });
          if (view === 'coach') {
            return React.createElement(CoachConsole, {
              canInteract: false,
              onAuthRequired: () => setStatus('Auth requerida pelo CoachConsole.'),
              currentPlan: plan,
            });
          }
          return null;
        })();

        return React.createElement(
          'main',
          { className: 'min-h-screen bg-brand-dark text-brand-light p-4 md:p-6' },
          React.createElement(
            'header',
            { className: 'mx-auto mb-6 max-w-7xl rounded-2xl border border-white/10 bg-brand-gray p-4' },
            React.createElement('p', { className: 'font-mono text-xs uppercase tracking-widest text-brand-neon' }, 'Phase 6 QA Harness'),
            React.createElement('h1', { className: 'font-display text-4xl uppercase text-white' }, 'Treino IA visual smoke'),
            React.createElement('p', { className: 'mt-2 text-sm text-brand-muted' }, status),
            React.createElement(
              'nav',
              { className: 'mt-4 flex flex-wrap gap-2' },
              tabs.map(([id, label]) => React.createElement(
                'button',
                {
                  key: id,
                  type: 'button',
                  onClick: () => setView(id),
                  className: `rounded-xl px-3 py-2 text-xs font-bold ${view === id ? 'bg-brand-neon text-brand-dark' : 'bg-white/10 text-white'}`,
                },
                label,
              )),
            ),
          ),
          React.createElement('section', { className: 'mx-auto max-w-7xl' }, currentView),
        );
      }

      createRoot(document.getElementById('root')).render(React.createElement(Shell));
    </script>
  </body>
</html>
